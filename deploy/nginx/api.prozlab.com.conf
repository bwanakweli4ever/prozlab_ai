# ProzLab API — /etc/nginx/sites-available/api.prozlab.com
#
# HTTP: proxy to FastAPI (or redirect to HTTPS after certbot).
# HTTPS must use a cert for api.prozlab.com — NOT erp.bullnet.rw or prozlab.com only.
#
# Backend allows uploads up to 5MB; nginx default is 1MB → set client_max_body_size 10M.

server {
    listen 80;
    listen [::]:80;
    server_name api.prozlab.com;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# After running: sudo certbot --nginx -d api.prozlab.com
# certbot will add a listen 443 ssl block here. If HTTPS still shows the wrong cert,
# remove conflicting default_server / erp.bullnet.rw blocks from sites-enabled.
